<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Community & Success Stories | KochiRetrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "surface-container": "#e5eeff",
                            "outline-variant": "#c2c6d3",
                            "inverse-surface": "#213145",
                            "surface-variant": "#d3e4fe",
                            "background": "#f8f9ff",
                            "secondary-container": "#a0f399",
                            "primary-container": "#0055a4",
                            "primary-fixed": "#d5e3ff",
                            "error": "#ba1a1a",
                            "inverse-on-surface": "#eaf1ff",
                            "surface": "#f8f9ff",
                            "secondary": "#1b6d24",
                            "on-primary-container": "#afccff",
                            "tertiary-fixed-dim": "#ffb95f",
                            "outline": "#727783",
                            "on-secondary": "#ffffff",
                            "primary-fixed-dim": "#a8c8ff",
                            "surface-dim": "#cbdbf5",
                            "on-surface": "#0b1c30",
                            "on-tertiary": "#ffffff",
                            "on-error-container": "#93000a",
                            "on-primary": "#ffffff",
                            "secondary-fixed": "#a3f69c",
                            "on-tertiary-container": "#ffbe6d",
                            "inverse-primary": "#a8c8ff",
                            "on-tertiary-fixed-variant": "#653e00",
                            "secondary-fixed-dim": "#88d982",
                            "on-secondary-container": "#217128",
                            "on-surface-variant": "#424751",
                            "surface-bright": "#f8f9ff",
                            "primary": "#003e7a",
                            "tertiary-container": "#794b00",
                            "on-secondary-fixed": "#002204",
                            "on-secondary-fixed-variant": "#005312",
                            "on-tertiary-fixed": "#2a1700",
                            "on-primary-fixed-variant": "#004689",
                            "surface-container-low": "#eff4ff",
                            "surface-tint": "#175ead",
                            "on-error": "#ffffff",
                            "tertiary-fixed": "#ffddb8",
                            "tertiary": "#593600",
                            "error-container": "#ffdad6",
                            "surface-container-highest": "#d3e4fe",
                            "on-background": "#0b1c30",
                            "surface-container-high": "#dce9ff",
                            "on-primary-fixed": "#001b3c",
                            "surface-container-lowest": "#ffffff"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "margin-mobile": "16px",
                            "container-max": "1280px",
                            "gutter": "24px",
                            "base": "8px",
                            "margin-desktop": "40px"
                        },
                        "fontFamily": {
                            "headline-lg": ["Plus Jakarta Sans"],
                            "body-md": ["Atkinson Hyperlegible Next"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "label-sm": ["Atkinson Hyperlegible Next"],
                            "label-md": ["Atkinson Hyperlegible Next"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "display-lg": ["Plus Jakarta Sans"],
                            "body-lg": ["Atkinson Hyperlegible Next"]
                        },
                        "fontSize": {
                            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md flex flex-col min-h-screen">

<!-- Dynamic Global Header -->
<header id="global-header"></header>

<main class="flex-grow max-w-[1280px] mx-auto px-6 md:px-10 py-12 w-full">
    <!-- Hero Header -->
    <div class="text-center max-w-2xl mx-auto mb-16 space-y-4">
        <div class="inline-flex items-center gap-2 bg-secondary-container text-on-secondary-container px-4 py-1.5 rounded-full shadow-sm text-xs font-bold w-fit">
            <span class="material-symbols-outlined text-sm">volunteer_activism</span>
            1,240 Items Reunited This Month
        </div>
        <h1 class="text-4xl font-extrabold text-slate-950 dark:text-white leading-tight">Wall of Kindness</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm">Read the heartfelt stories of Kochiites finding what they lost and expressing their gratitude to the community.</p>
        
        <div class="pt-4">
            <button id="open-story-btn" class="bg-primary text-white px-6 py-3 rounded-full font-bold text-sm shadow-md hover:opacity-95 transition-all active:scale-95 flex items-center gap-2 mx-auto">
                <span class="material-symbols-outlined text-base">share</span> Share Your Story
            </button>
        </div>
    </div>

    <!-- Stories Grid Feed -->
    <div id="stories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Loaded dynamically -->
    </div>
</main>

<!-- Story Modal Form -->
<div id="story-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md close-modal-btn"></div>
    <div class="relative bg-white dark:bg-slate-900 rounded-3xl shadow-2xl max-w-md w-full border border-slate-200 dark:border-slate-800 z-10 animate-fade-in">
        <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-extrabold text-slate-950 dark:text-white">Share Your Success Story</h2>
            <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full close-modal-btn text-slate-400 hover:text-slate-700 dark:hover:text-white transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="story-form" class="p-6 space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="story-title">Story Title</label>
                <input id="story-title" class="w-full px-4 py-3 rounded-xl border border-slate-350 dark:border-slate-700 bg-slate-50 dark:bg-slate-850 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm transition-all" placeholder="e.g. Reunited with my DSLR Camera!" required type="text">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="story-author">Your Name / Alias</label>
                <input id="story-author" class="w-full px-4 py-3 rounded-xl border border-slate-350 dark:border-slate-700 bg-slate-50 dark:bg-slate-850 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm transition-all" placeholder="e.g. Anjali M." required type="text">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="story-content">What happened?</label>
                <textarea id="story-content" class="w-full px-4 py-3 rounded-xl border border-slate-350 dark:border-slate-700 bg-slate-50 dark:bg-slate-850 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm transition-all" placeholder="Describe how you lost/found the item and how KochiRetrace helped you recover it..." required rows="5"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button type="button" class="px-5 py-2.5 border border-slate-350 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-semibold text-sm hover:bg-slate-100 dark:hover:bg-slate-800 close-modal-btn transition-colors">Cancel</button>
                <button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-xl font-semibold text-sm hover:opacity-90 active:scale-95 transition-all shadow-md flex items-center gap-2">
                    Publish Story
                    <span class="material-symbols-outlined text-base">send</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Dynamic Global Footer -->
<footer id="global-footer"></footer>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script><script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/community.js"></script>

</body>
</html>
