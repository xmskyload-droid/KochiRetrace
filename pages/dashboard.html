<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#003e7a">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../assets/images/logo.png">
    <title>User Dashboard | KochiRetrace</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "surface-container": "#e5eeff",
                            "outline-variant": "#c2c6d3",
                            "inverse-surface": "#213145",
                            "surface-variant": "#d3e4fe",
                            "background": "#f8f9ff",
                            "secondary-container": "#a0f399",
                            "primary-container": "#0055a4",
                            "primary-fixed": "#d5e3ff",
                            "error": "#ba1a1a",
                            "inverse-on-surface": "#eaf1ff",
                            "surface": "#f8f9ff",
                            "secondary": "#1b6d24",
                            "on-primary-container": "#afccff",
                            "tertiary-fixed-dim": "#ffb95f",
                            "outline": "#727783",
                            "on-secondary": "#ffffff",
                            "primary-fixed-dim": "#a8c8ff",
                            "surface-dim": "#cbdbf5",
                            "on-surface": "#0b1c30",
                            "on-tertiary": "#ffffff",
                            "on-error-container": "#93000a",
                            "on-primary": "#ffffff",
                            "secondary-fixed": "#a3f69c",
                            "on-tertiary-container": "#ffbe6d",
                            "inverse-primary": "#a8c8ff",
                            "on-tertiary-fixed-variant": "#653e00",
                            "secondary-fixed-dim": "#88d982",
                            "on-secondary-container": "#217128",
                            "on-surface-variant": "#424751",
                            "surface-bright": "#f8f9ff",
                            "primary": "#003e7a",
                            "tertiary-container": "#794b00",
                            "on-secondary-fixed": "#002204",
                            "on-secondary-fixed-variant": "#005312",
                            "on-tertiary-fixed": "#2a1700",
                            "on-primary-fixed-variant": "#004689",
                            "surface-container-low": "#eff4ff",
                            "surface-tint": "#175ead",
                            "on-error": "#ffffff",
                            "tertiary-fixed": "#ffddb8",
                            "tertiary": "#593600",
                            "error-container": "#ffdad6",
                            "surface-container-highest": "#d3e4fe",
                            "on-background": "#0b1c30",
                            "surface-container-high": "#dce9ff",
                            "on-primary-fixed": "#001b3c",
                            "surface-container-lowest": "#ffffff"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "margin-mobile": "16px",
                            "container-max": "1280px",
                            "gutter": "24px",
                            "base": "8px",
                            "margin-desktop": "40px"
                        },
                        "fontFamily": {
                            "headline-lg": ["Plus Jakarta Sans"],
                            "body-md": ["Atkinson Hyperlegible Next"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "label-sm": ["Atkinson Hyperlegible Next"],
                            "label-md": ["Atkinson Hyperlegible Next"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "display-lg": ["Plus Jakarta Sans"],
                            "body-lg": ["Atkinson Hyperlegible Next"]
                        },
                        "fontSize": {
                            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md flex flex-col min-h-screen">

<!-- Dynamic Navigation Header -->
<header id="global-header"></header>

<main class="flex-grow max-w-[1280px] mx-auto px-6 md:px-10 py-12 w-full">
    <div class="flex flex-col lg:flex-row gap-8">
        
        <!-- Left Panel: User Profile Summary & Stats -->
        <aside class="w-full lg:w-80 flex-shrink-0">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 space-y-6 text-center sticky top-24 shadow-sm">
                
                <!-- Profile Image & Info -->
                <div class="flex flex-col items-center">
                    <div class="relative group cursor-pointer w-24 h-24 rounded-full overflow-hidden border-4 border-primary-fixed shadow-md mb-2 bg-slate-100" onclick="document.getElementById('avatar-upload').click()" title="Click to change profile picture">
                        <img id="dash-user-avatar" class="w-full h-full object-cover group-hover:opacity-70 transition-opacity" src="" alt="User avatar">
                        <div class="absolute inset-0 bg-slate-900/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white text-[10px] font-bold">
                            Change Photo
                        </div>
                    </div>
                    <input id="avatar-upload" class="hidden" type="file" accept="image/*">
                    <h3 id="dash-user-name" class="text-xl font-bold text-slate-950 dark:text-white"></h3>
                    <p id="dash-user-email" class="text-xs text-slate-400 mt-0.5"></p>
                </div>

                <hr class="border-slate-200 dark:border-slate-800">

                <!-- Stats counters -->
                <div class="grid grid-cols-3 gap-2">
                    <div class="p-3 bg-slate-50 dark:bg-slate-850 rounded-2xl border border-slate-200/50 dark:border-slate-800">
                        <span id="count-reported" class="block text-lg font-extrabold text-primary">0</span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider block mt-1">Reported</span>
                    </div>
                    <div class="p-3 bg-slate-50 dark:bg-slate-850 rounded-2xl border border-slate-200/50 dark:border-slate-800">
                        <span id="count-claims" class="block text-lg font-extrabold text-secondary">0</span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider block mt-1">Claims</span>
                    </div>
                    <div class="p-3 bg-slate-50 dark:bg-slate-850 rounded-2xl border border-slate-200/50 dark:border-slate-800">
                        <span id="count-pending" class="block text-lg font-extrabold text-amber-500">0</span>
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider block mt-1">Pending</span>
                    </div>
                </div>

                <hr class="border-slate-200 dark:border-slate-800">
                
                <!-- Quick links -->
                <a href="report.html" class="w-full flex justify-center items-center gap-2 bg-primary text-white py-3 rounded-xl font-bold text-sm shadow-md hover:opacity-95 transition-all active:scale-95">
                    <span class="material-symbols-outlined text-base">add_circle</span> Report New Item
                </a>
            </div>
        </aside>

        <!-- Right Panel: Tabs and Workspace lists -->
        <div class="flex-grow bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm min-h-[60vh] flex flex-col">
            
            <!-- Tab Links Header -->
            <div class="flex border-b border-slate-200 dark:border-slate-800 overflow-x-auto gap-6 mb-6">
                <button id="tab-reports-btn" class="py-3 px-1 border-b-2 border-primary text-primary dark:border-primary-fixed dark:text-primary-fixed font-bold text-sm transition-colors whitespace-nowrap">
                    My Reports
                </button>
                <button id="tab-claims-btn" class="py-3 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-950 dark:hover:text-white font-semibold text-sm transition-colors whitespace-nowrap">
                    Claims I Made
                </button>
                <button id="tab-requests-btn" class="py-3 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-950 dark:hover:text-white font-semibold text-sm transition-colors whitespace-nowrap flex items-center gap-1.5">
                    Received Claims
                </button>
                <button id="tab-notifs-btn" class="py-3 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-950 dark:hover:text-white font-semibold text-sm transition-colors whitespace-nowrap">
                    Notifications
                </button>
            </div>

            <!-- TAB CONTENT PANELS -->
            <div class="flex-grow">
                <!-- Panel 1: My Reports -->
                <div id="panel-reports" class="space-y-4">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">My Reported Listings</h3>
                    <div id="my-reports-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Panel 2: Claims I Made -->
                <div id="panel-claims" class="hidden space-y-4 animate-fade-in">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">Claims Submitted on Other Listings</h3>
                    <div id="my-claims-list" class="space-y-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Panel 3: Received Claims -->
                <div id="panel-requests" class="hidden space-y-4 animate-fade-in">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">Claims Submitted on Your Items</h3>
                    <div id="received-requests-list" class="space-y-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Panel 4: Notifications -->
                <div id="panel-notifs" class="hidden space-y-4 animate-fade-in">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white">Recent Alerts</h3>
                        <button onclick="markAllNotificationsRead()" class="text-xs text-primary hover:underline">Mark all read</button>
                    </div>
                    <div id="notifications-list" class="space-y-3">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<!-- Dynamic Global Footer -->
<footer id="global-footer"></footer>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/dashboard.js"></script>

</body>
</html>
