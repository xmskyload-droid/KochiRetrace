<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | KochiRetrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Atkinson+Hyperlegible+Next:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "surface-container-low": "#eff4ff",
                            "error": "#ba1a1a",
                            "surface-container": "#e5eeff",
                            "primary-fixed": "#d5e3ff",
                            "tertiary-container": "#794b00",
                            "tertiary-fixed": "#ffddb8",
                            "secondary": "#1b6d24",
                            "secondary-container": "#a0f399",
                            "on-tertiary": "#ffffff",
                            "on-secondary-fixed": "#002204",
                            "on-primary-container": "#afccff",
                            "on-primary": "#ffffff",
                            "on-background": "#0b1c30",
                            "surface-container-highest": "#d3e4fe",
                            "secondary-fixed-dim": "#88d982",
                            "secondary-fixed": "#a3f69c",
                            "on-tertiary-container": "#ffbe6d",
                            "on-secondary": "#ffffff",
                            "inverse-on-surface": "#eaf1ff",
                            "surface-bright": "#f8f9ff",
                            "inverse-primary": "#a8c8ff",
                            "outline-variant": "#c2c6d3",
                            "on-secondary-container": "#217128",
                            "on-error": "#ffffff",
                            "inverse-surface": "#213145",
                            "tertiary-fixed-dim": "#ffb95f",
                            "surface": "#f8f9ff",
                            "on-tertiary-fixed-variant": "#653e00",
                            "surface-container-high": "#dce9ff",
                            "on-primary-fixed": "#001b3c",
                            "on-tertiary-fixed": "#2a1700",
                            "on-surface": "#0b1c30",
                            "surface-dim": "#cbdbf5",
                            "primary-container": "#0055a4",
                            "primary": "#003e7a",
                            "on-primary-fixed-variant": "#004689",
                            "error-container": "#ffdad6",
                            "primary-fixed-dim": "#a8c8ff",
                            "background": "#f8f9ff",
                            "tertiary": "#593600",
                            "on-secondary-fixed-variant": "#005312",
                            "on-surface-variant": "#424751",
                            "on-error-container": "#93000a",
                            "surface-tint": "#175ead",
                            "surface-container-lowest": "#ffffff",
                            "outline": "#727783",
                            "surface-variant": "#d3e4fe"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "container-max": "1280px",
                            "margin-desktop": "40px",
                            "margin-mobile": "16px",
                            "base": "8px",
                            "gutter": "24px"
                        },
                        "fontFamily": {
                            "label-md": ["Atkinson Hyperlegible Next"],
                            "body-md": ["Atkinson Hyperlegible Next"],
                            "headline-lg": ["Plus Jakarta Sans"],
                            "display-lg": ["Plus Jakarta Sans"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "body-lg": ["Atkinson Hyperlegible Next"],
                            "label-sm": ["Atkinson Hyperlegible Next"]
                        },
                        "fontSize": {
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-custom-image {
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.75)), url('../assets/images/kochi_light_hero.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">

<!-- Dynamic Global Header -->
<header id="global-header"></header>

<main class="flex-grow flex items-center justify-center relative bg-custom-image py-24 px-6">
    <!-- Center Login Card -->
    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 flex flex-col" id="login-card">
        <div class="p-8 md:p-10">
            <!-- Form Header -->
            <div class="mb-8" id="form-header">
                <h1 class="text-2xl font-bold text-primary dark:text-primary-fixed mb-2" id="form-title">Welcome Back</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400" id="form-subtitle">Securely access your KochiRetrace account to report or find items across Ernakulam.</p>
            </div>
            
            <!-- Form -->
            <form id="auth-form" class="space-y-6">
                <!-- Name Field (Hidden for Sign In) -->
                <div class="space-y-2 hidden" id="field-name-container">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="name">Full Name</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="name" placeholder="Arjun K." type="text"/>
                    </div>
                </div>

                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" placeholder="name@example.com" required="" type="email"/>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
                        <a class="text-xs text-primary dark:text-primary-fixed hover:underline" href="#" id="forgot-password-link">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" placeholder="••••••••" required="" type="password"/>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-primary text-white py-3.5 px-6 rounded-xl font-bold hover:opacity-95 transition-all active:scale-95 flex justify-center items-center gap-2 shadow-lg" id="submit-btn">
                    <span id="btn-text">Login</span>
                    <span class="material-symbols-outlined text-xl" id="btn-icon">login</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-4 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400">Or continue with</span>
                </div>
            </div>

            <!-- Social Logins -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="handleSocialLogin('Google')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-semibold text-slate-700 dark:text-slate-300">
                    <svg class="w-5 h-5" viewbox="0 0 24 24">
                        <path d="M12 5.04c1.61 0 3.05.56 4.19 1.64l3.12-3.12C17.43 1.83 14.92 1 12 1 7.37 1 3.42 3.66 1.49 7.58l3.65 2.84C6.01 7.21 8.78 5.04 12 5.04z" fill="#EA4335"></path>
                        <path d="M23.51 12.2c0-.83-.07-1.63-.2-2.4H12v4.54h6.45c-.28 1.48-1.12 2.74-2.38 3.58l3.68 2.86c2.16-1.99 3.76-4.93 3.76-8.58z" fill="#4285F4"></path>
                        <path d="M5.14 14.58c-.24-.71-.38-1.47-.38-2.26s.14-1.55.38-2.26L1.49 7.58C.54 9.51 0 11.69 0 14c0 2.31.54 4.49 1.49 6.42l3.65-2.84z" fill="#FBBC05"></path>
                        <path d="M12 23c3.08 0 5.67-1.02 7.56-2.76l-3.68-2.86c-1.08.73-2.47 1.16-3.88 1.16-3.22 0-5.99-2.17-6.86-5.38l-3.65 2.84C3.42 20.34 7.37 23 12 23z" fill="#34A853"></path>
                    </svg>
                    Google
                </button>
                <button onclick="handleSocialLogin('Apple')" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-semibold text-slate-700 dark:text-slate-300">
                    <svg class="w-5 h-5 fill-current text-slate-800 dark:text-white" viewbox="0 0 24 24">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.06.75.79 0 1.99-.81 3.46-.73 1.83.1 3.23 1.01 3.98 2.35-3.69 2.14-3.1 6.82.6 8.35-.74 1.76-1.74 3.12-3.1 4.25zm-3.01-13.3c-.11-2.28 1.74-4.21 3.91-4.32.24 2.51-2.2 4.54-3.91 4.32z"></path>
                    </svg>
                    Apple
                </button>
            </div>

            <!-- Sign up Toggle Link -->
            <div class="text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400" id="toggle-text">
                    Don't have an account? 
                    <button type="button" class="text-primary dark:text-primary-fixed font-bold hover:underline" id="toggle-auth-mode">Sign up</button>
                </p>
            </div>
        </div>
        <!-- Card Bottom Accent -->
        <div class="h-1.5 bg-primary"></div>
    </div>
</main>

<!-- Dynamic Global Footer -->
<footer id="global-footer"></footer>

<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shared.js"></script>
<script>
    let isSignUp = false;

    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const fieldNameContainer = document.getElementById('field-name-container');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const toggleAuthMode = document.getElementById('toggle-auth-mode');
    const toggleText = document.getElementById('toggle-text');
    const forgotPasswordLink = document.getElementById('forgot-password-link');

    // Switch between Sign In and Sign Up modes
    toggleAuthMode.addEventListener('click', () => {
        isSignUp = !isSignUp;
        
        if (isSignUp) {
            formTitle.textContent = "Create Account";
            formSubtitle.textContent = "Join the KochiRetrace community to find and report lost items across Ernakulam.";
            fieldNameContainer.classList.remove('hidden');
            nameInput.required = true;
            btnText.textContent = "Sign Up";
            btnIcon.textContent = "person_add";
            toggleText.innerHTML = `Already have an account? <button type="button" class="text-primary dark:text-primary-fixed font-bold hover:underline" id="toggle-auth-mode">Login</button>`;
            forgotPasswordLink.classList.add('hidden');
        } else {
            formTitle.textContent = "Welcome Back";
            formSubtitle.textContent = "Securely access your KochiRetrace account to report or find items across Ernakulam.";
            fieldNameContainer.classList.add('hidden');
            nameInput.required = false;
            btnText.textContent = "Login";
            btnIcon.textContent = "login";
            toggleText.innerHTML = `Don't have an account? <button type="button" class="text-primary dark:text-primary-fixed font-bold hover:underline" id="toggle-auth-mode">Sign up</button>`;
            forgotPasswordLink.classList.remove('hidden');
        }

        // Re-attach toggle handler to the new element
        document.getElementById('toggle-auth-mode').addEventListener('click', arguments.callee);
    });

    // Form Submission
    document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!window.Storage) {
            console.error("Storage not loaded!");
            return;
        }

        if (isSignUp) {
            const name = nameInput.value.trim();
            // Create user in storage list, then log in
            const users = JSON.parse(localStorage.getItem('kochiretrace_users') || '[]');
            if (users.some(u => u.email === email)) {
                window.showToast("Email address already registered!", "error");
                return;
            }
            const newUser = {
                id: 'usr_' + Date.now(),
                name: name,
                email: email,
                password: password,
                avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150&q=80'
            };
            users.push(newUser);
            localStorage.setItem('kochiretrace_users', JSON.stringify(users));
            window.Storage.login(email, password);
            window.showToast("Account created successfully!");
        } else {
            const session = window.Storage.login(email, password);
            if (!session) {
                window.showToast("Invalid email or password!", "error");
                return;
            }
            window.showToast("Successfully logged in!");
        }

        // Redirect to dashboard
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1000);
    });

    // Social login simulation
    function handleSocialLogin(provider) {
        window.showToast(`Logging in with ${provider}...`);
        
        setTimeout(() => {
            if (window.Storage) {
                // Login as Arjun K by default for social demo
                window.Storage.login("arjun@kochi.in", "password");
                window.showToast("Successfully logged in!");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        }, 1200);
    }
</script>
</body>
</html>
