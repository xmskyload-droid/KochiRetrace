<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Map | KochiRetrace</title>
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "surface-container": "#e5eeff",
                            "outline-variant": "#c2c6d3",
                            "inverse-surface": "#213145",
                            "surface-variant": "#d3e4fe",
                            "background": "#f8f9ff",
                            "secondary-container": "#a0f399",
                            "primary-container": "#0055a4",
                            "primary-fixed": "#d5e3ff",
                            "error": "#ba1a1a",
                            "inverse-on-surface": "#eaf1ff",
                            "surface": "#f8f9ff",
                            "secondary": "#1b6d24",
                            "on-primary-container": "#afccff",
                            "tertiary-fixed-dim": "#ffb95f",
                            "outline": "#727783",
                            "on-secondary": "#ffffff",
                            "primary-fixed-dim": "#a8c8ff",
                            "surface-dim": "#cbdbf5",
                            "on-surface": "#0b1c30",
                            "on-tertiary": "#ffffff",
                            "on-error-container": "#93000a",
                            "on-primary": "#ffffff",
                            "secondary-fixed": "#a3f69c",
                            "on-tertiary-container": "#ffbe6d",
                            "inverse-primary": "#a8c8ff",
                            "on-tertiary-fixed-variant": "#653e00",
                            "secondary-fixed-dim": "#88d982",
                            "on-secondary-container": "#217128",
                            "on-surface-variant": "#424751",
                            "surface-bright": "#f8f9ff",
                            "primary": "#003e7a",
                            "tertiary-container": "#794b00",
                            "on-secondary-fixed": "#002204",
                            "on-secondary-fixed-variant": "#005312",
                            "on-tertiary-fixed": "#2a1700",
                            "on-primary-fixed-variant": "#004689",
                            "surface-container-low": "#eff4ff",
                            "surface-tint": "#175ead",
                            "on-error": "#ffffff",
                            "tertiary-fixed": "#ffddb8",
                            "tertiary": "#593600",
                            "error-container": "#ffdad6",
                            "surface-container-highest": "#d3e4fe",
                            "on-background": "#0b1c30",
                            "surface-container-high": "#dce9ff",
                            "on-primary-fixed": "#001b3c",
                            "surface-container-lowest": "#ffffff"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "margin-mobile": "16px",
                            "container-max": "1280px",
                            "gutter": "24px",
                            "base": "8px",
                            "margin-desktop": "40px"
                        },
                        "fontFamily": {
                            "headline-lg": ["Plus Jakarta Sans"],
                            "body-md": ["Atkinson Hyperlegible Next"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "label-sm": ["Atkinson Hyperlegible Next"],
                            "label-md": ["Atkinson Hyperlegible Next"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "display-lg": ["Plus Jakarta Sans"],
                            "body-lg": ["Atkinson Hyperlegible Next"]
                        },
                        "fontSize": {
                            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Leaflet popup styles to match modern UI */
        .leaflet-popup-content-wrapper {
            background-color: rgb(255, 255, 255);
            border-radius: 1.5rem !important;
            padding: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 85, 164, 0.15) !important;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .leaflet-popup-content-wrapper {
            background-color: rgb(15, 23, 42);
            border: 1px solid rgba(51, 65, 85, 0.8);
        }
        .leaflet-popup-tip {
            background: white !important;
        }
        .dark .leaflet-popup-tip {
            background: rgb(15, 23, 42) !important;
        }
        .leaflet-popup-content {
            margin: 4px !important;
        }
        .leaflet-popup-close-button {
            top: 10px !important;
            right: 10px !important;
            color: #94a3b8 !important;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md flex flex-col min-h-screen">

<!-- Dynamic Navigation Header -->
<header id="global-header"></header>

<!-- Map Content Area -->
<main class="flex-grow relative w-full h-[calc(100vh-80px)] min-h-[500px] flex">
    
    <!-- Leaflet container fills main space -->
    <div id="map-container" class="w-full h-full z-10"></div>
    
    <!-- Floating Legend overlay -->
    <div class="absolute top-6 left-6 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 z-20 space-y-4 max-w-xs pointer-events-auto">
        <h3 class="text-sm font-extrabold text-slate-900 dark:text-white flex items-center gap-1.5">
            <span class="material-symbols-outlined text-primary text-base">map</span> Map Legend
        </h3>
        
        <div class="space-y-2.5 text-xs text-slate-600 dark:text-slate-300">
            <div class="flex items-center gap-2.5">
                <span class="w-3.5 h-3.5 rounded-full bg-error border border-white block shadow-sm animate-pulse"></span>
                <span>Active Lost Reports</span>
            </div>
            <div class="flex items-center gap-2.5">
                <span class="w-3.5 h-3.5 rounded-full bg-secondary border border-white block shadow-sm"></span>
                <span>Active Found Reports</span>
            </div>
            <div class="flex items-center gap-2.5">
                <span class="w-3.5 h-3.5 rounded-full bg-amber-500 border border-white block shadow-sm"></span>
                <span>Claim Requested</span>
            </div>
            <div class="flex items-center gap-2.5">
                <span class="w-3.5 h-3.5 rounded-full bg-slate-400 border border-white block shadow-sm"></span>
                <span>Returned / Verified</span>
            </div>
        </div>
        
        <div class="text-[10px] text-slate-400 pt-2 border-t leading-normal">
            Click on any pin to view details, photos, or file a secure claim request immediately.
        </div>
    </div>
</main>

<!-- Leaflet.js JavaScript -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- Scripts -->
<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/map.js"></script>

</body>
</html>
