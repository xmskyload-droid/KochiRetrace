<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | KochiRetrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "on-tertiary-fixed": "#2a1700",
                            "error": "#ba1a1a",
                            "on-primary": "#ffffff",
                            "surface-variant": "#d3e4fe",
                            "error-container": "#ffdad6",
                            "on-secondary-container": "#217128",
                            "surface-tint": "#175ead",
                            "on-tertiary-container": "#ffbe6d",
                            "on-error-container": "#93000a",
                            "background": "#f8f9ff",
                            "tertiary-fixed-dim": "#ffb95f",
                            "inverse-primary": "#a8c8ff",
                            "outline": "#727783",
                            "on-secondary-fixed-variant": "#005312",
                            "inverse-on-surface": "#eaf1ff",
                            "tertiary-container": "#794b00",
                            "secondary-fixed-dim": "#88d982",
                            "tertiary-fixed": "#ffddb8",
                            "tertiary": "#593600",
                            "surface": "#f8f9ff",
                            "on-primary-container": "#afccff",
                            "surface-container-high": "#dce9ff",
                            "primary-fixed": "#d5e3ff",
                            "inverse-surface": "#213145",
                            "primary-container": "#0055a4",
                            "surface-bright": "#f8f9ff",
                            "surface-container-low": "#eff4ff",
                            "on-tertiary": "#ffffff",
                            "surface-container-lowest": "#ffffff",
                            "surface-container": "#e5eeff",
                            "on-background": "#0b1c30",
                            "surface-dim": "#cbdbf5",
                            "primary-fixed-dim": "#a8c8ff",
                            "surface-container-highest": "#d3e4fe",
                            "secondary-fixed": "#a3f69c",
                            "on-secondary-fixed": "#002204",
                            "on-tertiary-fixed-variant": "#653e00",
                            "on-primary-fixed-variant": "#004689",
                            "on-primary-fixed": "#001b3c",
                            "on-error": "#ffffff",
                            "secondary-container": "#a0f399",
                            "primary": "#003e7a",
                            "on-surface-variant": "#424751",
                            "on-secondary": "#ffffff",
                            "outline-variant": "#c2c6d3",
                            "on-surface": "#0b1c30",
                            "secondary": "#1b6d24"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "margin-mobile": "16px",
                            "margin-desktop": "40px",
                            "gutter": "24px",
                            "container-max": "1280px",
                            "base": "8px"
                        },
                        "fontFamily": {
                            "label-sm": ["Atkinson Hyperlegible Next"],
                            "display-lg": ["Plus Jakarta Sans"],
                            "label-md": ["Atkinson Hyperlegible Next"],
                            "body-lg": ["Atkinson Hyperlegible Next"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "body-md": ["Atkinson Hyperlegible Next"],
                            "headline-lg": ["Plus Jakarta Sans"]
                        },
                        "fontSize": {
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-slate-50 dark:bg-slate-900 text-on-surface font-body-md flex flex-col min-h-screen">

<!-- Dynamic Global Header -->
<header id="global-header"></header>

<!-- Main Messages Area -->
<main class="flex-grow max-w-[1280px] mx-auto px-6 md:px-10 py-8 w-full h-[calc(100vh-80px)] min-h-[500px]">
    <div class="flex gap-6 bg-white dark:bg-slate-900 rounded-3xl h-full shadow-[0px_4px_24px_rgba(0,85,164,0.04)] border border-slate-200 dark:border-slate-800 overflow-hidden">
        
        <!-- Sidebar Panel: Active Chats list -->
        <aside class="w-full md:w-80 lg:w-96 flex flex-col border-r border-slate-250 dark:border-slate-800/80">
            <div class="p-6 border-b border-slate-250 dark:border-slate-800/80">
                <h2 class="text-xl font-bold text-primary dark:text-primary-fixed mb-4">Messages</h2>
                <div class="relative">
                    <input id="search-chats" class="w-full bg-slate-100 dark:bg-slate-800/60 rounded-xl py-2.5 pl-10 pr-4 border-none focus:ring-2 focus:ring-primary text-sm outline-none" placeholder="Search chats..." type="text">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
                </div>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto">
                <!-- Chat list dynamically loaded -->
            </div>
        </aside>

        <!-- Right Side Panel: Chat Thread -->
        <section class="hidden md:flex flex-grow flex-col relative h-full">
            <!-- Chat Header -->
            <header class="p-4 border-b border-slate-250 dark:border-slate-800/80 flex items-center justify-between bg-white dark:bg-slate-900">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-primary-fixed">
                        <img id="chat-header-avatar" class="w-full h-full object-cover" src="" alt="Active contact avatar">
                    </div>
                    <div>
                        <h2 id="chat-header-name" class="text-sm font-bold text-slate-900 dark:text-white leading-snug">Name</h2>
                        <p id="chat-header-item" class="text-[10px] text-primary dark:text-primary-fixed font-bold flex items-center gap-1 mt-0.5">
                            Item Details Link
                        </p>
                    </div>
                </div>
                <div class="flex gap-1.5">
                    <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-850 rounded-full text-slate-400 hover:text-slate-700 transition-colors" title="Report User">
                        <span class="material-symbols-outlined text-xl">report</span>
                    </button>
                </div>
            </header>

            <!-- Messaging Area Scroll -->
            <div class="flex-1 bg-slate-50 dark:bg-slate-950 p-6 overflow-y-auto space-y-4 flex flex-col">
                <!-- Safety Tip Alert Card -->
                <div class="p-4 bg-emerald-50 dark:bg-emerald-950/20 border border-emerald-200 dark:border-emerald-900 rounded-2xl flex gap-3 text-emerald-800 dark:text-emerald-350 text-xs">
                    <span class="material-symbols-outlined text-lg">verified_user</span>
                    <div>
                        <p class="font-bold mb-0.5">KochiRetrace Safety Tip</p>
                        <p class="leading-relaxed">Coordinate exchange at public places. We recommend meeting at active <span class="font-bold">Kochi Metro Stations</span> or the nearest <span class="font-bold">Police Station Helpdesk</span>. Avoid sharing bank details.</p>
                    </div>
                </div>

                <div id="message-container" class="space-y-4 flex-grow flex flex-col overflow-y-auto">
                    <!-- Message bubbles render dynamically -->
                </div>
            </div>

            <!-- Message Form Input -->
            <footer class="p-4 bg-white dark:bg-slate-900 border-t border-slate-250 dark:border-slate-800/80">
                <form id="message-form" class="flex gap-3">
                    <input id="message-input" class="flex-grow bg-slate-100 dark:bg-slate-800 rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary text-sm outline-none text-slate-800 dark:text-white placeholder:text-slate-400" placeholder="Type a secure message..." type="text" autocomplete="off">
                    <button type="submit" class="bg-primary text-white p-3 rounded-xl hover:opacity-95 transition-all shadow-md active:scale-95 flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl">send</span>
                    </button>
                </form>
            </footer>
        </section>

    </div>
</main>

<!-- Dynamic Global Footer -->
<footer id="global-footer"></footer>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>`n<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>`n<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>`n<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/messages.js"></script>

</body>
</html>
